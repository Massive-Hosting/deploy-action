name: 'Deploy via SSH'
description: 'Deploy files to a hosting account via SSH + rsync'
branding:
  icon: upload-cloud
  color: blue

inputs:
  ssh-key:
    description: 'SSH private key for authentication'
    required: true
  host:
    description: 'SSH hostname (e.g. tenant-id.example.com)'
    required: true
  user:
    description: 'SSH username (defaults to tenant ID extracted from host)'
    required: false
    default: ''
  website:
    description: 'Website directory name under ~/sites/'
    required: true
  source:
    description: 'Local directory to deploy'
    required: false
    default: '.'
  exclude:
    description: 'Space-separated list of rsync exclude patterns'
    required: false
    default: '.git .github node_modules'
  run-after:
    description: 'Commands to run on the server after deploy'
    required: false
    default: ''
  build:
    description: 'Build command to run before deploying'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup SSH key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "${{ inputs.ssh-key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -T 10 -H ${{ inputs.host }} >> ~/.ssh/known_hosts 2>/dev/null || true
        # Fallback: accept any host key if keyscan failed (e.g., behind NAT)
        echo "Host ${{ inputs.host }}" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config

    - name: Build
      if: inputs.build != ''
      shell: bash
      run: ${{ inputs.build }}

    - name: Deploy via rsync
      shell: bash
      run: |
        EXCLUDE_ARGS=""
        for pattern in ${{ inputs.exclude }}; do
          EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude=$pattern"
        done

        # Determine SSH user: explicit input, or extract tenant ID from hostname (first segment)
        SSH_USER="${{ inputs.user }}"
        if [ -z "$SSH_USER" ]; then
          SSH_USER=$(echo "${{ inputs.host }}" | cut -d. -f1)
        fi
        SSH_TARGET="${SSH_USER}@${{ inputs.host }}"

        rsync -azv --delete \
          $EXCLUDE_ARGS \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ${{ inputs.source }}/ \
          ${SSH_TARGET}:~/sites/${{ inputs.website }}/

    - name: Run post-deploy commands
      if: inputs.run-after != ''
      shell: bash
      run: |
        SSH_USER="${{ inputs.user }}"
        if [ -z "$SSH_USER" ]; then
          SSH_USER=$(echo "${{ inputs.host }}" | cut -d. -f1)
        fi
        SSH_TARGET="${SSH_USER}@${{ inputs.host }}"
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SSH_TARGET} << 'DEPLOY_EOF'
        ${{ inputs.run-after }}
        DEPLOY_EOF

    - name: Cleanup SSH key
      if: always()
      shell: bash
      run: rm -f ~/.ssh/deploy_key
